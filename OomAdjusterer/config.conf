# OOM Adjuster configuration
# This file is sourced directly by the shell — use shell syntax.
# No spaces around = and quote values that contain spaces.

# Space-separated list of app packages to protect from LMKD
protected_apps="com.evermorelabs.polygonx com.nianticlabs.pokemongo"

# Set to true to enable the PolygonX watchdog.
# Watchdog restarts PolygonX automatically if it gets killed.
enable_watchdog=false

# PoGo memory killer — kills PoGo when memory pressure is critical.
# Set enable_pogo_killer=false to disable entirely.
enable_pogo_killer=true
system_memory_threshold=95
pogo_memory_threshold_mb=3200
